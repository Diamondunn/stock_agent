{% extends "base.html" %}

{% block content %}
<h1 class="text-3xl font-bold mb-4">🤖 AI 投资助手</h1>

<div class="bg-white p-4 rounded shadow">
    <textarea id="message" class="w-full border p-2"></textarea>
    <button onclick="send()" class="mt-2 bg-blue-500 text-white px-4 py-2 rounded">
        发送
    </button>
</div>

<div id="response" class="mt-4 bg-white p-4 rounded shadow"></div>

<script>
async function send() {
    const message = document.getElementById("message").value;

    const res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message})
    });

    const data = await res.json();
    document.getElementById("response").innerText = data.response;
}
</script>
{% endblock %}
